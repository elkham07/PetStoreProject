groups:
  - name: petstore-alerts
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PetStore backend is DOWN"

      - alert: HighMemoryUsage
        expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 80%"